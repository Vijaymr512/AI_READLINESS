[build]
builder = "DOCKERFILE"

[[services]]
name = "backend"
source = "backend"
dockerfile = "backend/Dockerfile"

[services.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[services.variables]
PORT = "8000"

[[services]]
name = "frontend"
source = "frontend"
dockerfile = "frontend/Dockerfile"

[services.deploy]
healthcheckPath = "/"
healthcheckTimeout = 15
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
